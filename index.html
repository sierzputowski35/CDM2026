<style>
:root {
  /* Palette Master Build instructions */
  --bg-primary: #050816;
  --bg-secondary: #0B1020;
  --bg-card: #111827;
  --bg-elevated: #1A2235;
  
  --gold-primary: #F4C542;
  --gold-light: #FFD970;
  --gold-dark: #B38B2D;
  
  --text-main: #FFFFFF;
  --text-muted: #8B9DC3;
  --text-dim: #4B5563;
  
  --accent-blue: #00A8FF;
  --accent-green: #00E676;
  --accent-red: #FF4757;
  
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  
  --shadow-gold: 0 0 20px rgba(244, 197, 66, 0.2);
  --glass-border: 1px solid rgba(255, 255, 255, 0.1);
}

/* Base Style */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Inter', sans-serif;
  background-color: var(--bg-primary);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  background-image: radial-gradient(circle at top, #1A2235 0%, #050816 100%);
}

/* Header Esport Premium */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(5, 8, 22, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: var(--glass-border);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: 2px;
  background: linear-gradient(180deg, var(--gold-light), var(--gold-primary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

/* Navigation Bottom AAA */
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(11, 16, 32, 0.95);
  border-top: var(--glass-border);
  display: flex; justify-content: space-around;
  padding: 10px 5px 25px; z-index: 1000;
}
.nav-btn {
  background: none; border: none;
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; color: var(--text-muted);
  font-family: 'Bebas Neue', sans-serif; font-size: 11px;
  transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.nav-btn img {
  width: 32px; height: 32px;
  filter: grayscale(1) opacity(0.5);
  transition: all 0.3s;
}
.nav-btn.active { color: var(--gold-primary); transform: translateY(-5px); }
.nav-btn.active img {
  filter: grayscale(0) opacity(1);
  drop-shadow: 0 0 10px var(--gold-primary);
}

/* Match Cards AAA */
.match-card {
  background: var(--bg-card);
  border: var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 18px; margin-bottom: 15px;
  position: relative; overflow: hidden;
  transition: transform 0.2s;
}
.match-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
  opacity: 0.3;
}
.teams-area { display: flex; align-items: center; justify-content: space-between; }
.team-box { flex: 1; text-align: center; }
.team-flag { font-size: 38px; margin-bottom: 8px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
.team-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; }

.score-inputs {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-secondary);
  padding: 8px 15px; border-radius: var(--radius-md);
  border: 1px solid var(--text-dim);
}
.score-inp {
  width: 45px; height: 45px;
  background: none; border: none;
  color: var(--gold-primary); font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; text-align: center; outline: none;
}
.vs-divider { font-family: 'Bebas Neue', sans-serif; color: var(--text-dim); font-size: 18px; }

/* Podium Esport */
.podium-section {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 10px; margin: 30px 0;
}
.podium-place {
  background: linear-gradient(180deg, var(--bg-elevated), var(--bg-primary));
  border-radius: var(--radius-md) var(--radius-md) 0 0;
  width: 100px; display: flex; flex-direction: column; align-items: center;
  padding-top: 15px; border: var(--glass-border);
}
.p-1 { height: 160px; border-color: var(--gold-primary); box-shadow: var(--shadow-gold); }
.p-2 { height: 120px; }
.p-3 { height: 100px; }

/* Buttons AAA */
.btn-premium {
  background: linear-gradient(180deg, var(--gold-light), var(--gold-dark));
  border: none; border-radius: var(--radius-md);
  color: #000; font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 1px;
  padding: 12px; cursor: pointer;
  box-shadow: 0 4px 0 #8B6E23;
  transition: all 0.1s;
}
.btn-premium:active { transform: translateY(2px); box-shadow: 0 2px 0 #8B6E23; }

/* Rest of logic classes hidden for brevity but active in JS */
.hidden { display: none !important; }
.page { padding: 20px; padding-bottom: 120px; animation: slideIn 0.3s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
